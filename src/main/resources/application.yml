embedding:
  service:
    url: ${EMBEDDING_SERVICE_URL:http://localhost:8000}

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

tmdb:
  token: ${TMDB_TOKEN:}
