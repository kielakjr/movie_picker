services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: movie-db
    environment:
      POSTGRES_DB: moviedb
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/test/resources/init-pgvector.sql:/docker-entrypoint-initdb.d/init-pgvector.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d moviedb"]
      interval: 5s
      timeout: 3s
      retries: 5

  ai:
    build: ./ai
    container_name: movie-ai
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  app:
    build: .
    container_name: movie-app
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/moviedb
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      EMBEDDING_SERVICE_URL: http://ai:8000
    depends_on:
      postgres:
        condition: service_healthy
      ai:
        condition: service_healthy

volumes:
  postgres_data:
