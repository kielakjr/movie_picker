services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: movie-db
    environment:
      POSTGRES_DB: moviedb
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
